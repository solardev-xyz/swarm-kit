<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Swarm Kit Epoch Feed Smoke</title>
  <style>
    body {
      background: #101010;
      color: #e8e8e8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
      max-width: 760px;
      margin: 0 auto;
      padding: 32px;
    }
    h1 { font-size: 22px; margin: 0 0 8px; }
    p { color: #aaa; margin: 0 0 24px; }
    button {
      background: #f59e0b;
      color: white;
      border: 0;
      border-radius: 8px;
      padding: 10px 16px;
      font-weight: 650;
      cursor: pointer;
      margin: 0 8px 8px 0;
    }
    button.secondary { background: #242424; border: 1px solid #3a3a3a; }
    textarea {
      display: block;
      width: 100%;
      min-height: 92px;
      background: #1a1a1a;
      color: #e8e8e8;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px;
      font: 13px ui-monospace, SFMono-Regular, Menlo, monospace;
      margin: 0 0 12px;
    }
    .status {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      font: 13px ui-monospace, SFMono-Regular, Menlo, monospace;
      min-height: 44px;
      margin-top: 12px;
    }
    .ok { border-color: #22c55e66; }
    .bad { border-color: #ef444466; }
  </style>
</head>
<body>
  <h1>Swarm Kit Epoch Feed Smoke</h1>
  <p>Build first with <code>npm run build</code>, then upload this folder together with <code>dist/</code>.</p>

  <textarea id="payload">{"status":"online"}</textarea>
  <button id="connect">Connect</button>
  <button id="owner" class="secondary">Get Owner</button>
  <button id="write">Write Current Hour</button>
  <button id="read" class="secondary">Read Current Hour</button>
  <button id="latest" class="secondary">Read Latest 24h</button>

  <div id="status" class="status">Waiting for window.swarm...</div>

  <script type="module">
    import { createSwarmKit } from '../../dist/index.js';

    const status = document.getElementById('status');
    const payload = document.getElementById('payload');
    const kit = createSwarmKit(window.swarm);
    const feed = kit.createEpochFeed({
      topic: 'swarm-kit-smoke-status',
      period: 'hour',
    });
    let owner = '';

    function show(value, ok = true) {
      status.className = 'status ' + (ok ? 'ok' : 'bad');
      status.textContent = typeof value === 'string' ? value : JSON.stringify(value, null, 2);
    }

    function parsePayload() {
      return JSON.parse(payload.value);
    }

    document.getElementById('connect').onclick = async () => {
      try {
        show(await kit.requestAccess());
      } catch (error) {
        show(error.message, false);
      }
    };

    document.getElementById('owner').onclick = async () => {
      try {
        owner = await feed.getOwner();
        show({ owner });
      } catch (error) {
        show(error.message, false);
      }
    };

    document.getElementById('write').onclick = async () => {
      try {
        const result = await feed.write(parsePayload());
        owner = result.owner;
        show(result);
      } catch (error) {
        show(error.message, false);
      }
    };

    document.getElementById('read').onclick = async () => {
      try {
        if (!owner) owner = await feed.getOwner();
        show(await feed.readCurrent(owner));
      } catch (error) {
        show(error.message, false);
      }
    };

    document.getElementById('latest').onclick = async () => {
      try {
        if (!owner) owner = await feed.getOwner();
        show(await feed.readLatest(owner, { lookback: 24 }));
      } catch (error) {
        show(error.message, false);
      }
    };

    show(window.swarm ? 'window.swarm detected' : 'window.swarm not detected', Boolean(window.swarm));
  </script>
</body>
</html>
